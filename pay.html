<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta CLI - Payment</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;border-radius:24px;padding:40px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.5);max-width:440px;width:90%}
.logo{font-size:28px;font-weight:800;color:#38bdf8;margin-bottom:4px}
.sub{color:#94a3b8;font-size:14px;margin-bottom:20px}
.field{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#f1f5f9;font-size:14px;outline:none;margin-bottom:10px}
.field:focus{border-color:#38bdf8}
.field::placeholder{color:#475569}
.qr-wrap{background:#fff;border-radius:16px;padding:16px;display:inline-block;margin-bottom:16px}
.qr-wrap img{display:block;width:200px;height:200px;image-rendering:pixelated}
.price{font-size:36px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
.amount-input{display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.amount-input button{min-width:52px}
.amount-input input{width:80px;padding:8px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#f1f5f9;font-size:14px;text-align:center;outline:none}
.amount-input input:focus{border-color:#38bdf8}
.upi-id{background:#0f172a;padding:8px 14px;border-radius:10px;font-size:13px;color:#94a3b8;margin-bottom:14px;word-break:break-all}
.upi-id span{color:#38bdf8;font-weight:600}
.btn{display:inline-block;padding:11px 28px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s;margin:2px}
.btn-primary{background:#38bdf8;color:#0f172a}
.btn-primary:hover{background:#7dd3fc}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-outline{background:transparent;color:#38bdf8;border:1px solid #334155}
.btn-outline:hover{border-color:#38bdf8}
.btn-success{background:#22c55e;color:#0f172a}
.copy{font-size:12px;color:#64748b;margin-top:10px;cursor:pointer}
.copy:hover{color:#94a3b8}
#statusMsg{margin-top:12px;padding:10px;border-radius:10px;font-size:13px;display:none}
#licenseBox{margin-top:14px;padding:16px;background:#065f46;border-radius:12px;display:none}
#licenseBox .label{color:#6ee7b7;font-size:12px;margin-bottom:6px}
#licenseKey{color:#f1f5f9;font-size:18px;font-weight:700;word-break:break-all;background:#047857;padding:8px 12px;border-radius:8px;display:inline-block;font-family:monospace}
.sep{height:1px;background:#334155;margin:14px 0}
</style>
</head>
<body>
<div class="card">
<div class="logo">&#9650; Delta CLI</div>
<div class="sub" id="pageTitle">Payment Required</div>

<div class="qr-wrap"><img src="/qr.png" alt="QR Code" id="qrImg"></div>

<div class="price" id="amountDisplay">&#8377;100</div>
<div class="amount-input">
<button class="btn btn-outline" onclick="setAmount(50)">&#8377;50</button>
<button class="btn btn-primary" onclick="setAmount(100)">&#8377;100</button>
<button class="btn btn-outline" onclick="setAmount(200)">&#8377;200</button>
<button class="btn btn-outline" onclick="setAmount(500)">&#8377;500</button>
<input type="number" id="customAmt" placeholder="Other" min="1" onchange="setCustom()">
</div>
<div class="upi-id">UPI: <span id="upiDisplay">UPI_ID</span> <span class="copy" onclick="copyUpi()">&#128203;</span></div>
<a class="btn btn-primary" id="payLink" href="UPI_LINK_HTML" target="_blank">Pay &#8377;100</a>

<div class="sep"></div>
<div class="sub" style="font-size:13px">After payment, enter your Delta Exchange credentials</div>

<input class="field" type="text" id="regName" placeholder="Your Full Name *" autocomplete="name">
<input class="field" type="email" id="regEmail" placeholder="Your Email Address *" autocomplete="email">
<input class="field" type="text" id="regApikey" placeholder="Delta Exchange API Key *">
<input class="field" type="text" id="regApisec" placeholder="Delta Exchange API Secret *">
<select class="field" id="regBaseurl">
<option value="">-- Select Delta Base URL --</option>
<option value="https://api.india.delta.exchange">India Production (api.india.delta.exchange)</option>
<option value="https://cdn-ind.deltaex.org">India CDN (cdn-ind.deltaex.org)</option>
<option value="https://cdn-ind.testnet.deltaex.org">India Testnet (cdn-ind.testnet.deltaex.org)</option>
<option value="https://api.delta.exchange">Global (api.delta.exchange)</option>
</select>

<button class="btn btn-success" id="submitBtn" onclick="submitPayment()">&#10003; Submit Payment</button>

<div id="statusMsg"></div>

<div id="licenseBox">
<div class="label">&#10004; Payment Verified! Day Pass Active</div>
<div id="dayPassStatus" style="color:#f1f5f9;font-size:16px;font-weight:700;margin:8px 0">Unlimited access until midnight!</div>
<div style="margin-top:6px;color:#a7f3d0;font-size:12px">
No limits for the rest of the day. Free limit resets tomorrow.
</div>
</div>

</div>
<script>
var BASE_LINK = 'UPI_LINK_BASE';
var UPILINK = 'UPI_LINK';
var pollTimer = null;
var currentEmail = '';

function setAmount(n) {
document.getElementById('amountDisplay').innerHTML = '&#8377;' + n;
var link = UPILINK.replace(/am=\d+\.?\d*/, 'am=' + n + '.00');
document.getElementById('payLink').href = link;
document.getElementById('payLink').innerHTML = 'Pay &#8377;' + n;
document.getElementById('customAmt').value = '';
}
function setCustom() {
var v = parseInt(document.getElementById('customAmt').value);
if(v > 0) setAmount(v);
}
function copyUpi() {
navigator.clipboard.writeText(document.getElementById('upiDisplay').textContent);
}

function showStatus(msg, type) {
var el = document.getElementById('statusMsg');
el.style.display = 'block';
el.textContent = msg;
el.style.background = type === 'ok' ? '#065f46' : type === 'err' ? '#7f1d1d' : '#1e3a5f';
el.style.color = type === 'ok' ? '#6ee7b7' : type === 'err' ? '#fca5a5' : '#93c5fd';
}

function startPolling(email) {
currentEmail = email;
if (pollTimer) clearInterval(pollTimer);
pollTimer = setInterval(function() {
var xhr = new XMLHttpRequest();
xhr.open('GET', '/api/pay/status?email=' + encodeURIComponent(email), true);
xhr.onload = function() {
if (xhr.status === 200) {
var r = JSON.parse(xhr.responseText);
if (r.day_pass_active) {
clearInterval(pollTimer);
pollTimer = null;
showDayPass();
}
}
};
xhr.send();
}, 5000);
}

function showDayPass() {
document.getElementById('licenseBox').style.display = 'block';
document.getElementById('pageTitle').textContent = '&#10004; Day Pass Active!';
document.getElementById('pageTitle').style.color = '#22c55e';
document.getElementById('submitBtn').disabled = false;
document.getElementById('submitBtn').textContent = '&#10003; Submit Payment';
}

function submitPayment() {
var name = document.getElementById('regName').value.trim();
var email = document.getElementById('regEmail').value.trim();
var apikey = document.getElementById('regApikey').value.trim();
var apisec = document.getElementById('regApisec').value.trim();
var baseurl = document.getElementById('regBaseurl').value.trim();
var utr = document.getElementById('utrInput').value.trim();
if (!name || !email || !apikey || !apisec || !baseurl || !utr) { showStatus('All fields are required', 'err'); return; }
if (!email.includes('@')) { showStatus('Enter a valid email', 'err'); return; }
if (apikey.length < 8) { showStatus('API Key seems too short', 'err'); return; }
if (apisec.length < 8) { showStatus('API Secret seems too short', 'err'); return; }
if (!baseurl) { showStatus('Select a Delta Base URL', 'err'); return; }
if (!/^[A-Za-z0-9]{12,30}$/.test(utr)) { showStatus('UTR must be 12-30 alphanumeric characters', 'err'); return; }

var btn = document.getElementById('submitBtn');
btn.disabled = true;
btn.textContent = 'Submitting...';

var xhr = new XMLHttpRequest();
xhr.open('POST', '/api/pay/utr', true);
xhr.setRequestHeader('Content-Type', 'application/json');
xhr.onload = function() {
if (xhr.status === 200) {
var r = JSON.parse(xhr.responseText);
showStatus('UTR recorded. Waiting for verification...', 'ok');
startPolling(email);
} else {
var r = JSON.parse(xhr.responseText);
showStatus('Error: ' + (r.error || xhr.statusText), 'err');
btn.disabled = false;
btn.textContent = '&#10003; Submit Payment';
}
};
xhr.onerror = function() {
showStatus('Network error. Try again.', 'err');
btn.disabled = false;
btn.textContent = '&#10003; Submit Payment';
};
xhr.send(JSON.stringify({name: name, email: email, apikey: apikey, apisec: apisec, baseurl: baseurl, utr: utr}));
}

// Check if email passed in URL
var params = new URLSearchParams(window.location.search);
var urlEmail = params.get('email');
if (urlEmail) document.getElementById('regEmail').value = urlEmail;
</script>
</body>
</html>
